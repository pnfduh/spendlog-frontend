<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SpendLog"/>
  <meta name="theme-color" content="#0f0f12"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <title>SpendLog – Spending Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <style>
    :root {
      --bg:      #0f0f12;
      --surface: #18181d;
      --border:  rgba(255,255,255,0.07);
      --accent:  #f0a500;
      --text:    #f0f0f8;
      --muted:   #7070a0;
      --sans:    'Outfit', system-ui, sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      min-height: 100dvh;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-mark {
      width: 80px; height: 80px;
      background: var(--accent);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 40px rgba(240,165,0,0.35);
    }
    .logo-mark svg { width: 44px; height: 44px; }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      text-align: center;
      line-height: 1.1;
    }
    .tagline {
      margin-top: 10px;
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      max-width: 300px;
    }

    /* ── FEATURE PILLS ── */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 28px;
      max-width: 340px;
    }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── CTA BUTTONS ── */
    .cta-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      margin-top: 36px;
    }
    .btn-install {
      background: var(--accent);
      color: #000;
      font-weight: 800;
      font-size: 1rem;
      padding: 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      letter-spacing: -0.01em;
      font-family: var(--sans);
      transition: opacity 0.15s;
    }
    .btn-install:active { opacity: 0.85; }
    /* hidden until beforeinstallprompt fires */
    .btn-install.hidden { display: none; }

    .btn-open {
      background: var(--surface);
      color: var(--text);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-family: var(--sans);
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-open:active { background: #222; }

    /* ── iOS INSTALL HINT ── */
    .ios-hint {
      display: none;
      margin-top: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 320px;
      text-align: center;
    }
    .ios-hint.show { display: block; }
    .ios-hint strong { color: var(--text); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 48px;
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--muted);
      opacity: 0.5;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5">
      <rect x="2" y="5" width="20" height="16" rx="3"/>
      <path d="M16 3v4M8 3v4M2 11h20"/>
      <circle cx="8" cy="16" r="1.5" fill="#111"/>
      <circle cx="12" cy="16" r="1.5" fill="#111"/>
      <circle cx="16" cy="16" r="1.5" fill="#111"/>
    </svg>
  </div>

  <h1>SpendLog</h1>
  <p class="tagline">Your spending calendar. See where every dollar goes, day by day.</p>

  <div class="features">
    <div class="pill">📅 Calendar view</div>
    <div class="pill">🏦 Bank sync</div>
    <div class="pill">🔔 Alerts</div>
    <div class="pill">💳 All accounts</div>
    <div class="pill">🔒 Private</div>
  </div>

  <div class="cta-wrap">
    <!-- shown on Android/Chrome when installable -->
    <button class="btn-install hidden" id="btn-install">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M4 20h16"/></svg>
      Install App
    </button>

    <!-- always shown: opens the app directly -->
    <a class="btn-open" href="/app">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Open SpendLog
    </a>
  </div>

  <!-- iOS install instructions (shown only on iOS Safari) -->
  <div class="ios-hint" id="ios-hint">
    To install: tap <strong>Share</strong> <svg style="display:inline;vertical-align:middle" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    then <strong>Add to Home Screen</strong>
  </div>

  <div class="footer">spendlog · v1.0</div>

<script>
  // ── Detect iOS Safari ──
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || navigator.standalone === true;

  // If already running as installed PWA on /, redirect straight into the app
  if (isStandalone) {
    window.location.replace('/app');
  }

  if (isIOS && isSafari && !isStandalone) {
    document.getElementById('ios-hint').classList.add('show');
  }

  // ── Android/Chrome install prompt ──
  let _deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredPrompt = e;
    document.getElementById('btn-install').classList.remove('hidden');
  });

  document.getElementById('btn-install').addEventListener('click', async () => {
    if (!_deferredPrompt) return;
    _deferredPrompt.prompt();
    const { outcome } = await _deferredPrompt.userChoice;
    _deferredPrompt = null;
    if (outcome === 'accepted') {
      document.getElementById('btn-install').classList.add('hidden');
    }
  });

  // Register the real service worker (for PWA installability on /)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
